name: Bug Report
description: Report a bug to help us improve EdgeLoop
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: What did you do to trigger the bug?
      placeholder: |
        1. Open EdgeLoop
        2. Paste URL 'https://...'
        3. Click 'Play'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - Windows 11 (Beta/Insider)
        - Other
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Primary Browser
      description: Which browser do you use for cookie extraction?
      options:
        - Chrome
        - Firefox
        - Edge
        - Opera
        - Brave
        - None (Direct URLs)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EdgeLoop Version
      placeholder: v1.0.0-prerelease
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics Log
      description: Please paste the content of your 'diagnostics.log' file here if available.
      render: shell
  - type: textarea
    id: logs
    attributes:
      label: General Logs
      description: Please paste any error messages from 'EdgeLoop.log'.
      render: shell
