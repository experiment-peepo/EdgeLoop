name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🛡️ Security'
    labels:
      - 'security'
  - title: '💅 Polish'
    labels:
      - 'polish'
      - 'ui'
  - title: '📝 Documentation'
    labels:
      - 'documentation'
  - title: '🧪 Internal'
    labels:
      - 'internal'
      - 'refactor'
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
template: |
  ## What's Changed

  $CHANGES

  ---
  *This release was automatically drafted by Release Drafter.*
