name: Build and Release

on:
  push:
    branches: [ "main", "master", "beta", "release" ]
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore EdgeLoop.sln

    - name: Generate Version and Extract Release Notes
      id: git_version
      run: |
        # Extract version from .csproj
        $projectFile = "EdgeLoop/EdgeLoop.csproj"
        $projectContent = Get-Content $projectFile -Raw
        if ($projectContent -match "<Version>(.*?)</Version>") {
            $baseVersion = $matches[1]
        } else {
            $baseVersion = "1.0.0"
        }

        if ("${{ github.ref_type }}" -eq "tag") {
          $version = "${{ github.ref_name }}" -replace "v", ""
        } else {
          $version = "$baseVersion"
        }
        
        # Clean numeric version for AssemblyVersion/FileVersion
        $numericVersion = ($version -split '-')[0]
        if ($numericVersion -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
           $parts = $numericVersion.Split('.')
           while ($parts.Count -lt 3) { $parts += "0" }
           $numericVersion = ($parts[0..2] -join ".")
        }

        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "numeric_version=$numericVersion" >> $env:GITHUB_OUTPUT
        
        # Detect prerelease
        $isPrerelease = ($version -match "beta|alpha|rc|prerelease") ? "true" : "false"
        echo "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT

        # Extract latest release notes from CHANGELOG.md
        $changelog = Get-Content "CHANGELOG.md" -Raw
        # Matches from the first ## header to the next ## header or end of file
        if ($changelog -match "(?s)## \[[^\]]+\] - \d{4}-\d{2}-\d{2}(.*?)(?=\n## \[|$)") {
            $notes = $matches[1].Trim()
            
            # Modern multi-line output handling
            $delimiter = "EOF"
            "release_notes<<$delimiter" >> $env:GITHUB_OUTPUT
            $notes >> $env:GITHUB_OUTPUT
            "$delimiter" >> $env:GITHUB_OUTPUT
        } else {
            echo "release_notes=No detailed changelog found for this version." >> $env:GITHUB_OUTPUT
        }

        echo "Computed Version: $version"
        echo "Numeric Version: $numericVersion"
        echo "Is Prerelease: $isPrerelease"
      shell: pwsh
      
    - name: Update Project Version
      run: |
        $version = "${{ steps.git_version.outputs.version }}"
        $projectFile = "EdgeLoop\EdgeLoop.csproj"
        $content = Get-Content $projectFile -Raw
        $newContent = $content -replace "<Version>.*?</Version>", "<Version>$version</Version>"
        Set-Content -Path $projectFile -Value $newContent
        Write-Host "Updated EdgeLoop.csproj version to $version"
      shell: pwsh
      
    - name: Download External Dependencies (yt-dlp & ffmpeg)
      run: |
        $ErrorActionPreference = "Stop"
        $ProgressPreference = 'SilentlyContinue'
        
        function Download-WithRetry {
            param($Uri, $OutFile, $MaxRetries = 3)
            for ($i = 1; $i -le $MaxRetries; $i++) {
                try {
                    Write-Host "Attempt ${i}: Downloading $OutFile from $Uri"
                    Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UserAgent "Mozilla/5.0"
                    
                    # Basic validation: Check if file exists and has size
                    if (!(Test-Path $OutFile) -or (Get-Item $OutFile).Length -lt 1000) {
                        throw "Downloaded file is missing or too small."
                    }
                    
                    # Binary check: Windows executables and ZIPs should NOT look like HTML
                    $content = Get-Content -Path $OutFile -TotalCount 1
                    if ($content -match "<!DOCTYPE" -or $content -match "<html" -or $content -match "Sorry about that") {
                        throw "Downloaded file appears to be an HTML error page, not a binary!"
                    }
                    
                    Write-Host "Successfully downloaded $OutFile"
                    return
                } catch {
                    Write-Host "Warning: Attempt $i failed: $($_.Exception.Message)"
                    if ($i -lt $MaxRetries) {
                        $delay = $i * 20
                        Write-Host "Retrying in $delay seconds..."
                        Start-Sleep -Seconds $delay
                    } else {
                        Write-Error "Failed to download $OutFile after $MaxRetries attempts."
                        throw $_
                    }
                }
            }
        }

        New-Item -ItemType Directory -Force -Path "Dependencies"
        
        # Download yt-dlp
        Download-WithRetry -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "Dependencies/yt-dlp.exe"
        
        # Download ffmpeg
        Download-WithRetry -Uri "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        
        Write-Host "Extracting ffmpeg..."
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp" -Force
        
        $ffmpegExe = Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
        if ($ffmpegExe) {
            Copy-Item -Path $ffmpegExe.FullName -Destination "Dependencies/ffmpeg.exe" -Force
            Write-Host "ffmpeg.exe ready. Size: $((Get-Item "Dependencies/ffmpeg.exe").Length)"
        } else {
            Write-Error "ffmpeg.exe not found in downloaded zip!"
        }
        
        Write-Host "Listing Dependencies folder:"
        Get-ChildItem "Dependencies" | Select-Object Name, Length, LastWriteTime | Format-Table
      shell: pwsh
      
    - name: Build and Publish
      run: |
        dotnet publish EdgeLoop\EdgeLoop.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=false `
          -o publish
        
        # Ensure update_dependencies.bat is included
        New-Item -ItemType Directory -Force -Path "publish/Dependencies"
        Copy-Item "Dependencies/update_dependencies.bat" "publish/Dependencies/" -Force


      
    - name: Verify executable exists
      run: |
        $exePath = Get-ChildItem "publish/EdgeLoop.exe" | Select-Object -First 1
        if (-not $exePath) {
          Write-Error "EdgeLoop.exe not found in publish directory"
          exit 1
        }
        if (-not (Test-Path "publish/Dependencies/yt-dlp.exe")) {
            Write-Error "yt-dlp.exe not found in publish directory"
            exit 1
        }
        if (-not (Test-Path "publish/Dependencies/ffmpeg.exe")) {
            Write-Error "ffmpeg.exe not found in publish directory"
            exit 1
        }
        if (-not (Test-Path "publish/Dependencies/update_dependencies.bat")) {
            Write-Error "update_dependencies.bat not found in publish directory"
            exit 1
        }
        $fileSize = $exePath.Length
        Write-Host "Executable found: $($exePath.Name) ($fileSize bytes)"
        Write-Host "Dependencies verified: yt-dlp.exe, ffmpeg.exe, update_dependencies.bat"
      shell: pwsh
      
    - name: Create Data Folder and Add README
      run: |
        New-Item -ItemType Directory -Force -Path "publish/Data"
        Copy-Item "README.txt" "publish/README.txt"
      shell: pwsh
      
    - name: Create Zip Package
      run: |
        Compress-Archive -Path "publish/*" -DestinationPath "EdgeLoop.zip" -CompressionLevel Optimal
      shell: pwsh



    - name: Update Git Tag
      run: |
        $tag = "v${{ steps.git_version.outputs.version }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f $tag
        git push origin $tag --force
      shell: pwsh

    - name: Create Release
      if: github.ref_type == 'tag' || github.ref == 'refs/heads/release'
      uses: softprops/action-gh-release@v2
      with:
        files: EdgeLoop.zip
        tag_name: v${{ steps.git_version.outputs.version }}
        name: ${{ steps.git_version.outputs.is_prerelease == 'true' && 'Beta Release ' || 'Release ' }}v${{ steps.git_version.outputs.version }}
        body: |
          ${{ steps.git_version.outputs.release_notes }}
          
          ---
          ### Installation
          1. Download `EdgeLoop.zip` from the assets below.
          2. Extract the contents to a folder.
          3. Run `EdgeLoop.exe`.
          
          ### System Requirements
          - Windows x64
          - .NET 10 Desktop Runtime required (Framework-dependent build)
        draft: false
        prerelease: ${{ steps.git_version.outputs.is_prerelease == 'true' }}
        token: "${{ github.token }}"
        fail_on_unmatched_files: true
        generate_release_notes: false

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        path: ./publish
        format: 'spdx-json'
        output-file: 'EdgeLoop-SBOM.json'

    - name: Attest Build Provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "EdgeLoop.zip"


