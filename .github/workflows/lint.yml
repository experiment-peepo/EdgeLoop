name: Code Quality (Lint)

on:
  push:
    branches: [ "main", "master", "beta", "release" ]
  pull_request:
    branches: [ "main", "master", "beta", "release" ]

jobs:
  lint:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore EdgeLoop.sln
      
    - name: Check Formatting
      uses: reviewdog/action-dotnet-format@v1
      with:
        github_token: "${{ github.token }}"
        reporter: github-pr-review
        level: warning
        fail_on_error: true
        filter_mode: added
      
    - name: Static Analysis
      run: dotnet build EdgeLoop.sln -c Release /p:AnalysisLevel=latest /p:EnforceCodeStyleInBuild=true
