name: Code Quality (Lint)

on:
  push:
    branches: [ "main", "master", "beta", "release" ]
  pull_request:
    branches: [ "main", "master", "beta", "release" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore EdgeLoop.sln
      
    - name: Check Formatting
      run: dotnet format EdgeLoop.sln --verify-no-changes --verbosity diagnostic
      
    - name: Static Analysis
      run: dotnet build EdgeLoop.sln -c Release /p:AnalysisLevel=latest /p:EnforceCodeStyleInBuild=true
