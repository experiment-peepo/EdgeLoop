name: Code Quality (Lint)

on:
  push:
    branches: [ "main", "master", "beta", "release" ]
  pull_request:
    branches: [ "main", "master", "beta", "release" ]

jobs:
  lint:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore EdgeLoop.sln
      
    - name: Setup reviewdog
      uses: reviewdog/action-setup@v1
      with:
        reviewdog_version: latest
        
    - name: Check Formatting
      shell: bash
      env:
        REVIEWDOG_GITHUB_API_TOKEN: "${{ github.token }}"
      run: |
        dotnet format EdgeLoop.sln --verify-no-changes --verbosity diagnostic 2>&1 | \
        reviewdog -f=dotnetformat \
                  -name="dotnet-format" \
                  -reporter=github-pr-review \
                  -level=warning \
                  -filter-mode=added
      
    - name: Static Analysis
      run: dotnet build EdgeLoop.sln -c Release /p:AnalysisLevel=latest /p:EnforceCodeStyleInBuild=true
